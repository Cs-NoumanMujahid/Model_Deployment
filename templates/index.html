<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suicide Detection System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #5cb85c; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; display: block; width: 100%; }
        button:hover { background-color: #4cae4c; }
        .result { margin-top: 20px; font-weight: bold; text-align: center; }
        .suicide { color: #d9534f; }
        .non-suicide { color: #5cb85c; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Suicide Detection Predictor</h2>
        <p>Enter text below to predict if the text indicates suicidal tendency or not.</p>
        <form method="POST">
            <textarea name="text" placeholder="Type text here..." required>{{ user_input }}</textarea>
            <button type="submit">Predict</button>
        </form>
        {% if prediction %}
        <div class="result">
            Prediction: <span class="{{ prediction|lower }}">{{ prediction }}</span>
        </div>
        {% endif %}
    </div>
</body>
</html>
